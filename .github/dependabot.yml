---
version: 2
updates:
  # Docker: Alleen security issues (door limit 0)
  - package-ecosystem: "docker"
    directories:
      - "/docker/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 0

  # GitHub Actions: Gegroepeerde updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - "*"

  # npm: Alleen security issues (door limit 0)
  - package-ecosystem: "npm"
    directories:
      - "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 0

  # Composer: Alleen security issues (door limit 0)
  - package-ecosystem: "composer"
    directories:
      - "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 0
