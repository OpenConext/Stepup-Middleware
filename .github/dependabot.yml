version: 2
updates:
  # Docker (security updates only)
  - package-ecosystem: "docker"
    directory: "/docker/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 0

  # GitHub Actions (security updates only)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 0

  # npm (security updates only)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 0

  # Composer (security updates only)
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 0
